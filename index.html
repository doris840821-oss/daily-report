<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工地日報系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F4F0;
    --card: #FFFFFF;
    --border: #E0DDD6;
    --text: #1A1A18;
    --text-sub: #6B6860;
    --accent: #2B5F3E;
    --accent-light: #E8F0EB;
    --accent-hover: #1E4530;
    --danger: #8B2020;
    --danger-light: #F5E8E8;
    --warning-light: #FFF8E8;
    --warning-text: #7A5500;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .nav { background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .nav-logo { font-size: 16px; font-weight: 700; color: var(--accent); padding: 16px 0; margin-right: 32px; letter-spacing: 0.02em; }
  .nav-tabs { display: flex; }
  .nav-tab { padding: 18px 20px; font-size: 14px; font-weight: 500; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; color: var(--text-sub); transition: all 0.15s; }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-tab:hover:not(.active) { color: var(--text); background: var(--bg); }

  .page { display: none; max-width: 820px; margin: 0 auto; padding: 28px 20px; }
  .page.active { display: block; }
  .page-header { margin-bottom: 24px; }
  .page-header h2 { font-size: 22px; font-weight: 700; }
  .page-header p { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .card-title { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .card-title-action { font-size: 11px; color: var(--accent); cursor: pointer; font-weight: 600; text-transform: none; letter-spacing: 0; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 500; color: var(--text-sub); }
  input[type="text"], input[type="date"], input[type="password"], select, textarea {
    width: 100%; padding: 9px 12px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    border: 1px solid var(--border); border-radius: 8px; background: var(--bg);
    color: var(--text); transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(43,95,62,0.12); }
  textarea { resize: vertical; min-height: 80px; }

  .select-add-row { display: flex; gap: 6px; }
  .select-add-row select { flex: 1; }
  .icon-btn { flex-shrink: 0; width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--accent); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .icon-btn:hover { background: var(--accent-light); border-color: var(--accent); }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: var(--radius); padding: 24px; width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .modal p { font-size: 13px; color: var(--text-sub); margin-bottom: 14px; }
  .modal-list { margin-bottom: 12px; max-height: 180px; overflow-y: auto; }
  .modal-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: var(--bg); border-radius: 6px; font-size: 13px; margin-bottom: 6px; }
  .modal-item-del { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
  .modal-item-del:hover { background: var(--danger-light); color: var(--danger); }
  .modal-add-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .modal-add-row input { flex: 1; }
  .modal-footer { display: flex; justify-content: flex-end; }

  .overtime-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .checkbox-label { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text); }
  .checkbox-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  #overtime-select { width: auto; min-width: 150px; opacity: 0.4; pointer-events: none; }
  #overtime-select.enabled { opacity: 1; pointer-events: auto; }

  .work-item { display: flex; gap: 10px; align-items: flex-start; padding: 12px; background: var(--bg); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border); }
  .work-item select { flex: 0 0 105px; }
  .work-item textarea { flex: 1; min-height: 56px; }
  .remove-btn { background: none; border: none; cursor: pointer; color: var(--text-sub); padding: 6px; border-radius: 6px; font-size: 16px; line-height: 1; transition: all 0.15s; flex-shrink: 0; }
  .remove-btn:hover { background: var(--danger-light); color: var(--danger); }
  .add-btn { background: none; border: 1px dashed var(--border); border-radius: 8px; padding: 9px 16px; font-size: 13px; font-weight: 500; color: var(--text-sub); cursor: pointer; width: 100%; margin-top: 4px; transition: all 0.15s; }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .btn-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }
  .btn { padding: 10px 22px; font-size: 14px; font-weight: 500; font-family: 'Noto Sans TC', sans-serif; border-radius: 8px; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); background: var(--card); color: var(--text); }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-sm { padding: 6px 14px; font-size: 12px; }

  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
  .alert-success { background: var(--accent-light); color: var(--accent); border: 1px solid #B2D0BC; }
  .alert-error { background: var(--danger-light); color: var(--danger); border: 1px solid #DEB5B5; }

  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .metric { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); }
  .metric-label { font-size: 11px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .metric-value { font-size: 28px; font-weight: 700; color: var(--text); }
  .metric-value.red { color: var(--danger); }

  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-row select, .filter-row input { width: auto; min-width: 120px; font-size: 13px; padding: 7px 10px; }
  .table-wrap { overflow-x: auto; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 9px 12px; font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid var(--border); white-space: nowrap; }
  td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; background: var(--accent-light); color: var(--accent); }
  .note-cell { color: var(--warning-text); background: var(--warning-light); padding: 4px 8px; border-radius: 6px; font-size: 12px; }
  .empty-state { text-align: center; padding: 40px; color: var(--text-sub); font-size: 14px; }
  .loading { text-align: center; padding: 30px; color: var(--text-sub); font-size: 13px; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .metric-grid { grid-template-columns: 1fr 1fr; }
    .metric-grid .metric:last-child { grid-column: 1 / -1; }
    .nav-logo { font-size: 14px; margin-right: 16px; }
    .nav-tab { padding: 16px 12px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- 員工姓名 Modal -->
<div class="modal-overlay" id="modal-emp">
  <div class="modal">
    <h3>管理員工姓名</h3>
    <p>新增或刪除員工名單</p>
    <div class="modal-list" id="modal-emp-list"></div>
    <div class="modal-add-row">
      <input type="text" id="modal-emp-input" placeholder="輸入新員工姓名" onkeydown="if(event.key==='Enter') addEmp()">
      <button class="btn btn-primary btn-sm" onclick="addEmp()">新增</button>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-emp')">關閉</button>
    </div>
  </div>
</div>

<!-- 工作類型 Modal -->
<div class="modal-overlay" id="modal-type">
  <div class="modal">
    <h3>管理工作項目類型</h3>
    <p>新增或刪除工作類型</p>
    <div class="modal-list" id="modal-type-list"></div>
    <div class="modal-add-row">
      <input type="text" id="modal-type-input" placeholder="輸入新工作類型" onkeydown="if(event.key==='Enter') addType()">
      <button class="btn btn-primary btn-sm" onclick="addType()">新增</button>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-type')">關閉</button>
    </div>
  </div>
</div>

<div class="nav">
  <div class="nav-logo">🏗 工地日報</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('employee', this)">填寫日報</button>
    <button class="nav-tab" onclick="switchPage('boss', this)">管理後台</button>
  </div>
</div>

<!-- 員工頁面 -->
<div id="page-employee" class="page active">
  <div class="page-header">
    <h2>今日工作日報</h2>
    <p id="today-label"></p>
  </div>

  <div id="alert-success" class="alert alert-success">✓ 日報提交成功！</div>
  <div id="alert-error" class="alert alert-error">⚠ 提交失敗，請檢查網路後再試。</div>

  <div class="card">
    <div class="card-title">基本資料</div>
    <div class="form-grid">
      <div class="form-group">
        <label>員工姓名</label>
        <div class="select-add-row">
          <select id="emp-name"></select>
          <button class="icon-btn" onclick="openModal('modal-emp')" title="管理員工">＋</button>
        </div>
      </div>
      <div class="form-group">
        <label>工作日期</label>
        <input type="date" id="work-date">
      </div>
      <div class="form-group full">
        <label>工地地點</label>
        <input type="text" id="site-name" placeholder="請輸入工地地點">
      </div>
      <div class="form-group">
        <label>正常工時</label>
        <select id="work-hours">
          <option>4 小時</option>
          <option>5 小時</option>
          <option>6 小時</option>
          <option>7 小時</option>
          <option selected>8 小時</option>
          <option>9 小時</option>
        </select>
      </div>
      <div class="form-group">
        <label>加班</label>
        <div class="overtime-row">
          <label class="checkbox-label">
            <input type="checkbox" id="overtime-check" onchange="toggleOvertime()">
            有加班
          </label>
          <select id="overtime-select">
            <option value="">選擇加班時數</option>
            <option>1 小時</option>
            <option>2 小時</option>
            <option>3 小時</option>
            <option>4 小時</option>
            <option>5 小時</option>
            <option>6 小時</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      工作項目
      <span class="card-title-action" onclick="openModal('modal-type')">＋ 管理類型</span>
    </div>
    <div id="work-items"></div>
    <button class="add-btn" onclick="addWorkItem()">＋ 新增工作項目</button>
  </div>

  <div class="card">
    <div class="card-title">備註 / 問題回報</div>
    <textarea id="emp-notes" placeholder="如有材料不足、安全疑慮、或其他需要回報的事項，請填寫於此..."></textarea>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="clearForm()">清除重填</button>
    <button class="btn btn-primary" id="submit-btn" onclick="submitReport()">提交日報</button>
  </div>
</div>

<!-- 老闆頁面 -->
<div id="page-boss" class="page">
  <div id="boss-lock" style="max-width:340px; margin: 60px auto; text-align:center;">
    <div style="font-size:48px; margin-bottom:16px;">🔒</div>
    <h2 style="font-size:20px; margin-bottom:8px;">管理後台</h2>
    <p style="font-size:13px; color:var(--text-sub); margin-bottom:24px;">請輸入密碼以進入</p>
    <input type="password" id="boss-password" placeholder="請輸入密碼" style="text-align:center; font-size:16px; letter-spacing:0.1em; margin-bottom:12px;" onkeydown="if(event.key==='Enter') checkPassword()">
    <div id="pw-error" style="color:var(--danger); font-size:13px; margin-bottom:12px; display:none;">密碼錯誤，請再試一次</div>
    <button class="btn btn-primary" style="width:100%;" onclick="checkPassword()">進入後台</button>
  </div>

  <div id="boss-content" style="display:none;">
    <div class="page-header">
      <h2>管理後台</h2>
      <p>所有員工的工作日報記錄</p>
    </div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">總回報筆數</div><div class="metric-value" id="metric-total">—</div></div>
      <div class="metric"><div class="metric-label">今日回報人次</div><div class="metric-value" id="metric-today">—</div></div>
      <div class="metric"><div class="metric-label">待處理備註</div><div class="metric-value red" id="metric-notes">—</div></div>
    </div>
    <div class="card">
      <div class="card-title">篩選條件</div>
      <div class="filter-row">
        <select id="filter-emp" onchange="applyFilter()"><option value="">所有員工</option></select>
        <input type="date" id="filter-date" onchange="applyFilter()">
        <button class="btn btn-sm" onclick="clearFilter()">清除篩選</button>
        <button class="btn btn-sm btn-primary" onclick="loadReports()">🔄 重新整理</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">日報記錄</div>
      <div id="table-area"><div class="loading">載入中...</div></div>
    </div>
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbynnlg5dyzGcz6hJl3cVTvmOENTnxziUMeOl2Ovx-ctOcjTfacu_KAEOSvJeA820a5z/exec';

let employees = ['魯冠臻', '許紫菱', '謝鎧丞', '候皓禎'];
let workTypes = ['倉庫', '點工', '清潔整理', '其他'];
let allReports = [];

function init() {
  const today = new Date();
  document.getElementById('today-label').textContent = today.toLocaleDateString('zh-TW', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
  document.getElementById('work-date').value = today.toISOString().split('T')[0];
  renderEmpSelect();
  addWorkItem();
}

// ── 員工選單 ──
function renderEmpSelect() {
  const cur = document.getElementById('emp-name').value;
  document.getElementById('emp-name').innerHTML = '<option value="">請選擇員工</option>' + employees.map(e => `<option${e===cur?' selected':''}>${e}</option>`).join('');
  const fsel = document.getElementById('filter-emp');
  if (fsel) {
    const fc = fsel.value;
    fsel.innerHTML = '<option value="">所有員工</option>' + employees.map(e => `<option${e===fc?' selected':''}>${e}</option>`).join('');
  }
}

// ── 工作類型 ──
function renderTypeSelects() {
  document.querySelectorAll('.work-type-sel').forEach(sel => {
    const cur = sel.value;
    sel.innerHTML = workTypes.map(t => `<option${t===cur?' selected':''}>${t}</option>`).join('');
  });
}

// ── 加班 ──
function toggleOvertime() {
  const chk = document.getElementById('overtime-check');
  const sel = document.getElementById('overtime-select');
  if (chk.checked) sel.classList.add('enabled');
  else { sel.classList.remove('enabled'); sel.value = ''; }
}

// ── 工作項目 ──
function addWorkItem() {
  const div = document.createElement('div');
  div.className = 'work-item';
  div.innerHTML = `
    <select class="work-type-sel">${workTypes.map(t => `<option>${t}</option>`).join('')}</select>
    <textarea placeholder="詳細說明工作內容、完成數量、進度..."></textarea>
    <button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById('work-items').appendChild(div);
}

// ── Modal ──
function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'modal-emp') renderModalEmpList();
  if (id === 'modal-type') renderModalTypeList();
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function renderModalEmpList() {
  document.getElementById('modal-emp-list').innerHTML = employees.length
    ? employees.map((e, i) => `<div class="modal-item"><span>${e}</span><button class="modal-item-del" onclick="deleteEmp(${i})">✕</button></div>`).join('')
    : '<div style="font-size:13px;color:var(--text-sub);padding:6px 0;">尚無員工</div>';
}
function addEmp() {
  const input = document.getElementById('modal-emp-input');
  const val = input.value.trim();
  if (!val) return;
  if (employees.includes(val)) { alert('此姓名已存在'); return; }
  employees.push(val);
  input.value = '';
  renderModalEmpList();
  renderEmpSelect();
}
function deleteEmp(i) {
  if (!confirm(`確定刪除「${employees[i]}」？`)) return;
  employees.splice(i, 1);
  renderModalEmpList();
  renderEmpSelect();
}

function renderModalTypeList() {
  document.getElementById('modal-type-list').innerHTML = workTypes.length
    ? workTypes.map((t, i) => `<div class="modal-item"><span>${t}</span><button class="modal-item-del" onclick="deleteType(${i})">✕</button></div>`).join('')
    : '<div style="font-size:13px;color:var(--text-sub);padding:6px 0;">尚無類型</div>';
}
function addType() {
  const input = document.getElementById('modal-type-input');
  const val = input.value.trim();
  if (!val) return;
  if (workTypes.includes(val)) { alert('此類型已存在'); return; }
  workTypes.push(val);
  input.value = '';
  renderModalTypeList();
  renderTypeSelects();
}
function deleteType(i) {
  if (!confirm(`確定刪除「${workTypes[i]}」？`)) return;
  workTypes.splice(i, 1);
  renderModalTypeList();
  renderTypeSelects();
}

// ── 提交 ──
async function submitReport() {
  const emp = document.getElementById('emp-name').value;
  const site = document.getElementById('site-name').value.trim();
  const date = document.getElementById('work-date').value;
  if (!emp || !site || !date) { alert('請填寫員工姓名、工地地點和日期'); return; }
  const hasOT = document.getElementById('overtime-check').checked;
  const otVal = document.getElementById('overtime-select').value;
  if (hasOT && !otVal) { alert('請選擇加班時數'); return; }
  const items = [...document.querySelectorAll('.work-item')].map(el => ({
    type: el.querySelector('select').value,
    desc: el.querySelector('textarea').value.trim()
  }));
  const data = {
    date, emp, site,
    hours: document.getElementById('work-hours').value,
    overtime: hasOT ? otVal : '無',
    works: items.map(w => `【${w.type}】${w.desc || '（無說明）'}`).join(' / '),
    notes: document.getElementById('emp-notes').value.trim()
  };
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '提交中...';
  try {
    await fetch(SHEET_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
    showAlert('success');
    clearForm();
  } catch(e) { showAlert('error'); }
  finally { btn.disabled = false; btn.textContent = '提交日報'; }
}

function showAlert(type) {
  const el = document.getElementById('alert-' + type);
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function clearForm() {
  document.getElementById('emp-name').value = '';
  document.getElementById('site-name').value = '';
  document.getElementById('emp-notes').value = '';
  document.getElementById('work-hours').value = '8 小時';
  document.getElementById('overtime-check').checked = false;
  document.getElementById('overtime-select').value = '';
  document.getElementById('overtime-select').classList.remove('enabled');
  document.getElementById('work-items').innerHTML = '';
  addWorkItem();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 後台 ──
async function loadReports() {
  document.getElementById('table-area').innerHTML = '<div class="loading">載入中...</div>';
  try {
    const res = await fetch(SHEET_URL + '?t=' + Date.now());
    const rows = await res.json();
    allReports = rows.slice(1).map(r => ({ date:r[0], emp:r[1], site:r[2], hours:r[3], overtime:r[4], works:r[5], notes:r[6] })).reverse();
    updateMetrics();
    renderTable(allReports);
  } catch(e) {
    document.getElementById('table-area').innerHTML = '<div class="empty-state">⚠ 無法載入資料，請確認網路連線後重新整理</div>';
  }
}

function updateMetrics() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('metric-total').textContent = allReports.length;
  document.getElementById('metric-today').textContent = allReports.filter(r => r.date === today).length;
  document.getElementById('metric-notes').textContent = allReports.filter(r => r.notes).length;
}

function renderTable(data) {
  if (!data.length) { document.getElementById('table-area').innerHTML = '<div class="empty-state">尚無符合條件的日報記錄</div>'; return; }
  document.getElementById('table-area').innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr><th>日期</th><th>員工</th><th>工地</th><th>正常工時</th><th>加班</th><th>工作內容</th><th>備註</th></tr></thead>
      <tbody>${data.map(r => `
        <tr>
          <td style="white-space:nowrap">${r.date}</td>
          <td><span class="badge">${r.emp}</span></td>
          <td style="font-size:12px">${r.site}</td>
          <td style="white-space:nowrap;font-size:12px">${r.hours}</td>
          <td style="white-space:nowrap;font-size:12px">${r.overtime||'無'}</td>
          <td style="font-size:12px;max-width:220px">${(r.works||'').replace(/ \/ /g,'<br>')}</td>
          <td style="font-size:12px;max-width:140px">${r.notes?`<span class="note-cell">${r.notes}</span>`:'<span style="color:var(--text-sub)">—</span>'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
}

function applyFilter() {
  const fe = document.getElementById('filter-emp').value;
  const fd = document.getElementById('filter-date').value;
  renderTable(allReports.filter(r => (!fe||r.emp===fe) && (!fd||r.date===fd)));
}
function clearFilter() {
  document.getElementById('filter-emp').value = '';
  document.getElementById('filter-date').value = '';
  renderTable(allReports);
}

function checkPassword() {
  if (document.getElementById('boss-password').value === '0981516186') {
    document.getElementById('boss-lock').style.display = 'none';
    document.getElementById('boss-content').style.display = 'block';
    renderEmpSelect();
    loadReports();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('boss-password').value = '';
    document.getElementById('boss-password').focus();
  }
}

function switchPage(p, btn) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  btn.classList.add('active');
  if (p === 'boss') {
    document.getElementById('boss-lock').style.display = 'block';
    document.getElementById('boss-content').style.display = 'none';
    document.getElementById('boss-password').value = '';
    document.getElementById('pw-error').style.display = 'none';
  }
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
});

init();
</script>
</body>
</html>
